name: Release (Windows Onefile)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.8 (strict)
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Show Python version
        run: |
          python --version
          pip --version

      - name: Upgrade pip tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # 处理 Flask/Werkzeug 与 Python 3.8 的兼容：
      # Flask 3.x / Werkzeug 3.x 要求 Python >= 3.9
      # 这里强制安装可在 Python 3.8 使用的组合
      - name: Install dependencies (Python 3.8 compatible)
        shell: pwsh
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          req = Path("requirements.txt")
          lines = req.read_text(encoding="utf-8").splitlines()
          filtered = []
          for line in lines:
              s = line.strip()
              if not s or s.startswith("#"):
                  filtered.append(line)
                  continue
              if re.match(r"(?i)^flask(\s*[<>=!~].*)?$", s):
                  continue
              if re.match(r"(?i)^werkzeug(\s*[<>=!~].*)?$", s):
                  continue
              filtered.append(line)

          Path("requirements-ci.txt").write_text("\n".join(filtered) + "\n", encoding="utf-8")
          print("generated requirements-ci.txt")
          PY
          pip install -r requirements-ci.txt
          pip install "Flask==2.3.3" "Werkzeug==2.3.8"
          pip install "pyinstaller==5.13.2"

      - name: Build onefile exe
        run: |
          pyinstaller main-onefile.spec

      - name: Verify artifact
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/file_share.exe")) {
            Write-Error "dist/file_share.exe not found"
            exit 1
          }
          Get-Item "dist/file_share.exe" | Format-List FullName,Length,LastWriteTime

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist/file_share.exe" "release/file_share-windows-x64.exe"

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/file_share-windows-x64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
