name: Release (Windows Onefile)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.8 (strict)
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Show Python version
        run: |
          python --version
          pip --version

      - name: Upgrade pip tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # 使用 temp.txt 安装依赖（无版本限制，与本地环境一致）
      # 然后手动指定 Flask/Werkzeug 版本以确保 Python 3.8 兼容
      - name: Install dependencies (Python 3.8 compatible)
        shell: pwsh
        run: |
          pip install -r temp.txt
          pip install "Flask==2.3.3" "Werkzeug==2.3.8"
          python -c "import netifaces; print('netifaces ok:', netifaces.__version__)"
          python -c "import pystray; print('pystray ok:', pystray.__version__)"
          pip install "pyinstaller==5.13.2"

      - name: Build onefile exe
        run: |
          pyinstaller --clean main-onefile.spec

      - name: Verify artifact
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/file_share.exe")) {
            Write-Error "dist/file_share.exe not found"
            exit 1
          }
          Get-Item "dist/file_share.exe" | Format-List FullName,Length,LastWriteTime

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist/file_share.exe" "release/file_share-windows-x64.exe"

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/file_share-windows-x64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
