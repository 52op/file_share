name: Release (Windows Onefile)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.8 (strict)
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Show Python version
        run: |
          python --version
          pip --version

      - name: Upgrade pip tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # 使用 temp.txt 安装依赖（无版本限制，与本地环境一致）
      # 然后手动指定 Flask/Werkzeug 版本以确保 Python 3.8 兼容
      - name: Install dependencies (Python 3.8 compatible)
        shell: pwsh
        run: |
          pip install -r temp.txt
          pip install "Flask==2.3.3" "Werkzeug==2.3.8"
          python -c "import netifaces; print('netifaces ok:', netifaces.__version__)"
          python -c "import pystray; print('pystray ok:', pystray.__version__)"
          pip install "pyinstaller==5.13.2"

      - name: Build onefile exe
        run: |
          pyinstaller --clean main-onefile.spec

      - name: Build zip package
        run: |
          pyinstaller --clean main-zip.spec

      - name: Verify artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/file_share.exe")) {
            Write-Error "dist/file_share.exe not found"
            exit 1
          }
          if (-not (Test-Path "dist/main/file_share.exe")) {
            Write-Error "dist/main/file_share.exe not found"
            exit 1
          }
          Get-Item "dist/file_share.exe" | Format-List FullName,Length,LastWriteTime
          Get-Item "dist/main/file_share.exe" | Format-List FullName,Length,LastWriteTime

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist/file_share.exe" "release/file_share.exe"
          Compress-Archive -Path "dist/main/*" -DestinationPath "release/file_share.zip" -Force

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 文件分享工具 - Windows 版本
            
            ### 📦 下载选项：
            
            **1. 单文件版本** (`file_share.exe`)
            - 适用于 Windows 7 及以上系统
            - 一键运行，无需解压
            - 适合快速部署和使用
            
            **2. 压缩包版本** (`file_share.zip`)
            - 解压后运行 `file_share.exe`
            - 优点：方便修改模板文件（templates/）和静态资源（static/）
            - 适合需要自定义界面或功能的用户
            
            ### 💡 使用说明：
            - 单文件版本：直接双击运行即可
            - 压缩包版本：解压后双击 `file_share.exe` 运行
            - 首次运行会自动配置防火墙规则
            - 支持系统托盘后台运行
            
            ### 🔧 系统要求：
            - Windows 7 SP1 及以上版本
            - .NET Framework 4.5+（通常系统已内置）
          files: |
            release/file_share.exe
            release/file_share.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
